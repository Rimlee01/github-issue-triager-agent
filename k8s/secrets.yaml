# Apply with: kubectl create secret generic triager-secrets \
#   --from-literal=groq-api-key=YOUR_KEY \
#   --from-literal=github-token=YOUR_TOKEN \
#   --from-literal=api-key=YOUR_API_KEY \
#   -n triager
apiVersion: v1
kind: Secret
metadata:
  name: triager-secrets
  namespace: triager
type: Opaque
stringData:
  groq-api-key: "changeme"
  github-token: "changeme"
  api-key: "changeme"
  db-password: "triager"
  webhook-secret: "changeme"
