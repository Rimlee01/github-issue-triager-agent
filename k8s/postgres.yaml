apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: triager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: triager
            - name: POSTGRES_DB
              value: triager
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: triager-secrets
                  key: db-password
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: triager
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: triager
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
